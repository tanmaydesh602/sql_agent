<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SQL Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ---------- Landing Page ---------- */
    #landing {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    #landing h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    #landing p {
      font-size: 15px;
      color: #777;
      margin-bottom: 2rem;
      max-width: 420px;
      line-height: 1.6;
    }

    .upload-box {
      border: 2px dashed #ccc;
      border-radius: 16px;
      padding: 3rem 4rem;
      background: #fff;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .upload-box:hover {
      border-color: #1a73e8;
      background: #f7faff;
    }

    .upload-box .icon {
      font-size: 40px;
      margin-bottom: 12px;
    }

    .upload-box .title {
      font-size: 15px;
      font-weight: 500;
      color: #333;
      margin-bottom: 4px;
    }

    .upload-box .subtitle {
      font-size: 13px;
      color: #999;
    }

    #upload-error {
      margin-top: 1rem;
      font-size: 13px;
      color: #b91c1c;
      min-height: 18px;
    }

    .spinner {
      display: none;
      margin-top: 1rem;
      font-size: 13px;
      color: #1a73e8;
    }

    /* ---------- Chat App ---------- */
    #app {
      display: none;
      flex-direction: column;
      height: 100vh;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 { font-size: 18px; font-weight: 600; }

    #db-label {
      font-size: 12px;
      color: #888;
      margin-left: auto;
    }

    #new-db-btn {
      background: none;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
      color: #555;
    }

    #new-db-btn:hover { border-color: #bbb; }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .turn { display: flex; flex-direction: column; gap: 10px; }

    .bubble-user {
      align-self: flex-end;
      background: #1a73e8;
      color: #fff;
      padding: 10px 16px;
      border-radius: 18px 18px 4px 18px;
      max-width: 70%;
      font-size: 14px;
      line-height: 1.5;
    }

    .bubble-agent {
      align-self: flex-start;
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 4px 18px 18px 18px;
      padding: 14px 16px;
      max-width: 85%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .explanation {
      font-size: 14px;
      line-height: 1.6;
      color: #1a1a1a;
    }

    .sql-block {
      background: #1e1e2e;
      border-radius: 8px;
      overflow: hidden;
    }

    .sql-label {
      font-size: 11px;
      font-weight: 600;
      color: #888;
      padding: 6px 12px;
      background: #16161f;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .sql-block pre {
      padding: 10px 14px;
      font-size: 13px;
      color: #cdd6f4;
      font-family: "Fira Code", "Courier New", monospace;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.6;
    }

    .results-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .results-table th {
      background: #f5f5f5;
      text-align: left;
      padding: 7px 12px;
      font-weight: 600;
      color: #555;
      border-bottom: 1px solid #e0e0e0;
      white-space: nowrap;
    }

    .results-table td {
      padding: 7px 12px;
      border-bottom: 1px solid #f0f0f0;
      color: #333;
    }

    .results-table tr:last-child td { border-bottom: none; }
    .results-table tr:hover td { background: #fafafa; }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
    }

    .error-box {
      background: #fff5f5;
      border: 1px solid #fca5a5;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #b91c1c;
    }

    .blocked-box {
      background: #fffbeb;
      border: 1px solid #fcd34d;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #92400e;
    }

    .loading {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 14px 16px;
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 4px 18px 18px 18px;
      align-self: flex-start;
    }

    .dot {
      width: 7px; height: 7px;
      background: #bbb;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }

    #input-area {
      background: #fff;
      border-top: 1px solid #e5e5e5;
      padding: 1rem 1.5rem;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #question {
      flex: 1;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 120px;
      transition: border-color 0.15s;
    }

    #question:focus { border-color: #1a73e8; }

    #send {
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    #send:hover { background: #1558b0; }
    #send:disabled { background: #aaa; cursor: not-allowed; }
  </style>
</head>
<body>

<!-- ---------- Landing Page ---------- -->
<div id="landing">
  <h1>🗄️ SQL Agent</h1>
  <p>Upload a SQLite (.db) database to get started. Once loaded, you can ask questions about your data in plain English.</p>

  <label class="upload-box" id="upload-box">
    <div class="icon">📂</div>
    <div class="title">Click to upload a .db file</div>
    <div class="subtitle">SQLite databases only</div>
    <input type="file" accept=".db" style="display:none;" onchange="uploadDb(this)">
  </label>

  <div class="spinner" id="spinner">Reading database schema...</div>
  <div id="upload-error"></div>
</div>

<!-- ---------- Chat App ---------- -->
<div id="app">
  <header>
    <h1>🗄️ SQL Agent</h1>
    <span id="db-label"></span>
    <button id="new-db-btn" onclick="goToLanding()">Upload a different database</button>
  </header>

  <div id="chat"></div>

  <div id="input-area">
    <textarea id="question" rows="1" placeholder="Ask a question about your data..."></textarea>
    <button id="send" onclick="submitQuestion()">Ask →</button>
  </div>
</div>

<script>
  let history = [];

  const landingEl = document.getElementById("landing");
  const appEl = document.getElementById("app");
  const chatEl = document.getElementById("chat");
  const questionEl = document.getElementById("question");
  const sendBtn = document.getElementById("send");
  const spinnerEl = document.getElementById("spinner");
  const uploadErrorEl = document.getElementById("upload-error");

  questionEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      submitQuestion();
    }
  });

  questionEl.addEventListener("input", () => {
    questionEl.style.height = "auto";
    questionEl.style.height = questionEl.scrollHeight + "px";
  });

  async function uploadDb(input) {
    const file = input.files[0];
    if (!file) return;

    uploadErrorEl.textContent = "";
    spinnerEl.style.display = "block";

    const formData = new FormData();
    formData.append("file", file);

    try {
      const res = await fetch("/upload", { method: "POST", body: formData });
      const data = await res.json();
      spinnerEl.style.display = "none";

      if (!res.ok) {
        uploadErrorEl.textContent = data.detail || "Upload failed.";
        input.value = "";
        return;
      }

      document.getElementById("db-label").textContent = "📂 " + file.name;
      history = [];
      chatEl.innerHTML = "";
      landingEl.style.display = "none";
      appEl.style.display = "flex";
      questionEl.focus();

    } catch (err) {
      spinnerEl.style.display = "none";
      uploadErrorEl.textContent = "Could not reach the server.";
    }
  }

  function goToLanding() {
    appEl.style.display = "none";
    landingEl.style.display = "flex";
    uploadErrorEl.textContent = "";
    chatEl.innerHTML = "";
    history = [];
  }

  async function submitQuestion() {
    const question = questionEl.value.trim();
    if (!question) return;

    questionEl.value = "";
    questionEl.style.height = "auto";
    sendBtn.disabled = true;

    const turn = document.createElement("div");
    turn.className = "turn";
    turn.innerHTML = `<div class="bubble-user">${escapeHtml(question)}</div>`;
    chatEl.appendChild(turn);

    const loading = document.createElement("div");
    loading.className = "loading";
    loading.innerHTML = `<div class="dot"></div><div class="dot"></div><div class="dot"></div>`;
    chatEl.appendChild(loading);
    chatEl.scrollTop = chatEl.scrollHeight;

    try {
      const res = await fetch("/query", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question, history }),
      });

      const data = await res.json();
      loading.remove();

      const agent = document.createElement("div");
      agent.className = "bubble-agent";

      if (data.error === "destructive_query") {
        agent.innerHTML = `<div class="blocked-box">⚠️ Blocked: that query would modify the database and cannot be executed.</div>`;
      } else if (data.error) {
        agent.innerHTML = `
          ${data.sql ? sqlBlock(data.sql) : ""}
          <div class="error-box">⚠️ ${escapeHtml(data.error)}</div>`;
      } else {
        let html = `<div class="explanation">${escapeHtml(data.explanation)}</div>`;
        if (data.sql) html += sqlBlock(data.sql);
        if (data.results && data.results.length > 0) html += resultsTable(data.results);
        else if (data.sql) html += `<div style="font-size:13px;color:#888;">No rows returned.</div>`;
        agent.innerHTML = html;
      }

      turn.appendChild(agent);
      chatEl.scrollTop = chatEl.scrollHeight;

      history.push({ question, answer: data.explanation });

    } catch (err) {
      loading.remove();
      const agent = document.createElement("div");
      agent.className = "bubble-agent";
      agent.innerHTML = `<div class="error-box">⚠️ Could not reach the server. Is it running?</div>`;
      turn.appendChild(agent);
    }

    sendBtn.disabled = false;
    questionEl.focus();
  }

  function sqlBlock(sql) {
    return `
      <div class="sql-block">
        <div class="sql-label">Generated SQL</div>
        <pre>${escapeHtml(sql)}</pre>
      </div>`;
  }

  function resultsTable(rows) {
    const keys = Object.keys(rows[0]);
    const headers = keys.map(k => `<th>${escapeHtml(k)}</th>`).join("");
    const body = rows.map(row =>
      `<tr>${keys.map(k => `<td>${escapeHtml(String(row[k] ?? ""))}</td>`).join("")}</tr>`
    ).join("");
    return `
      <div class="table-wrap">
        <table class="results-table">
          <thead><tr>${headers}</tr></thead>
          <tbody>${body}</tbody>
        </table>
      </div>`;
  }

  function escapeHtml(str) {
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
</script>

</body>
</html>
